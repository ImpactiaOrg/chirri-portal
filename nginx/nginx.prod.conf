upstream chirri_backend {
    server backend:8000;
}
upstream chirri_frontend {
    server frontend:3000;
}
upstream chirri_minio {
    server minio:9000;
}

# ---------- HTTP (port 80): ACME challenge + redirect to HTTPS ----------
server {
    listen 80;
    server_name chirri.impactia.ai media.chirri.impactia.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS app: chirri.impactia.ai ----------
server {
    listen 443 ssl;
    http2 on;
    server_name chirri.impactia.ai;

    ssl_certificate /etc/letsencrypt/live/chirri.impactia.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chirri.impactia.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        access_log off;
    }

    location /admin/ {
        proxy_pass http://chirri_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://chirri_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://chirri_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---------- HTTPS storage: media.chirri.impactia.ai → MinIO bucket chirri-media ----------
server {
    listen 443 ssl;
    http2 on;
    server_name media.chirri.impactia.ai;

    ssl_certificate /etc/letsencrypt/live/chirri.impactia.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chirri.impactia.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Uploads via S3 API can be larger than 25M (datasets, exports). Cap at 200M.
    client_max_body_size 200M;

    # Rewrite "/key" → "/chirri-media/key" so the bucket name stays implicit
    # in public URLs (matches AWS_S3_CUSTOM_DOMAIN=media.chirri.impactia.ai
    # without prefix in django-storages).
    location / {
        rewrite ^/(.*)$ /chirri-media/$1 break;
        proxy_pass http://chirri_minio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_connect_timeout 30s;
    }
}
