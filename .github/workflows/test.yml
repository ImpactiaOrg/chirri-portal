name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - working-directory: backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint --if-present
      - run: npm run build
        env:
          BACKEND_INTERNAL_URL: http://localhost:8000

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Prepare .env
        run: cp .env.example .env

      # Install runner-side deps BEFORE docker compose up — the compose
      # mounts frontend/node_modules from host into the container as root,
      # which locks the runner user out of subsequent npm writes. Order
      # matters.
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Boot dev stack
        run: docker compose up -d --wait

      - name: Seed demo data
        run: docker compose exec -T backend python manage.py seed_demo

      - name: Run smoke tests
        working-directory: frontend
        run: npm run test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Collect compose logs on failure
        if: failure()
        run: docker compose logs --no-color > compose-logs.txt && cat compose-logs.txt

      - name: Upload compose logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt
          retention-days: 7
