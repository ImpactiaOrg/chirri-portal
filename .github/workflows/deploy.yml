name: Deploy

on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: ${{ secrets.HETZNER_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/chirri-portal
            git fetch origin development
            git reset --hard origin/development
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            docker image prune -f

  post_deploy_smoke:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/development'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps + Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Wait for deploy to stabilise
        run: |
          for i in {1..30}; do
            curl -fsS "${{ secrets.DEPLOY_URL }}/api/health/" && break || sleep 5
          done
      - name: Run post-deploy smoke against DEPLOY_URL
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.DEPLOY_URL }}
        run: npx playwright test --grep "Report viewer|Home smoke"
